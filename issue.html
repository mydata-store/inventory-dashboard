<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Issue Entry</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f5f6fa;color:#111827}
.topbar{height:76px;background:linear-gradient(90deg,#ffd782,#fff3d2);display:flex;align-items:center;justify-content:space-between;padding:0 28px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.logo{display:flex;align-items:center;gap:10px;font-weight:800}
.logo-icon{width:42px;height:42px;border-radius:12px;background:#f59e0b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo small,.user small{display:block;font-size:12px;color:#78350f}
.nav{display:flex;gap:10px;align-items:center}
.nav a{text-decoration:none;color:#111827;font-weight:700;font-size:13px;padding:11px 13px;border-radius:8px}
.nav a.active{background:#f59e0b;color:#fff}
.user{display:flex;align-items:center;gap:10px}
.user img{width:44px;height:44px;border-radius:50%;border:2px solid #fff}
.page{padding:28px}
h1{margin:0 0 20px;font-size:30px}
.actions{background:#fff;padding:16px;border-radius:12px;box-shadow:0 8px 25px rgba(15,23,42,.08);display:flex;gap:12px;margin-bottom:20px}
button,a.back{border:none;border-radius:8px;padding:12px 18px;font-weight:700;text-decoration:none;cursor:pointer}
.add{background:#2563eb;color:white}.save{background:#059669;color:white}.clear{background:#ef4444;color:white}
.excel{background:#ede9fe;color:#5b21b6}.pdf{background:#d1fae5;color:#047857}.print{background:#dbeafe;color:#1d4ed8}.draft{background:#e5e7eb}
.back{margin-left:auto;background:#ffedd5;color:#ea580c}
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 8px 25px rgba(15,23,42,.08);overflow:auto;max-height:calc(100vh - 270px)}
table{width:100%;min-width:1200px;border-collapse:collapse;table-layout:fixed}
th{background:#f6a11a;color:#111827;border:1px solid #cbd5e1;padding:9px;font-size:13px;position:sticky;top:0;z-index:5}
td{border:1px solid #cbd5e1;height:30px;padding:0}
td input{width:100%;height:29px;border:none;outline:none;background:transparent;padding:4px 6px;font-size:13px}
td input:focus{outline:2px solid #2563eb;background:#fff7ed}
.rowno{width:45px;text-align:center;background:#f8fafc}
.date{width:100px}.issue{width:95px}.item{width:240px}.size{width:100px}.qty{width:100px}.unit{width:90px}.stock{width:140px}.dept{width:130px}.issued{width:140px}.usefor{width:140px}.remarks{width:140px}
.item-suggest-box{position:absolute;background:#fff;border:1px solid #cbd5e1;box-shadow:0 8px 25px rgba(15,23,42,.18);z-index:9999;max-height:220px;overflow-y:auto;min-width:380px;font-size:13px}
.item-suggest-row{display:grid;grid-template-columns:1fr 90px 60px;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid #e5e7eb}
.item-suggest-row:hover,.item-suggest-row.active{background:#fff7ed}
.status{position:fixed;top:90px;right:25px;background:#16a34a;color:#fff;padding:12px 18px;border-radius:8px;font-weight:700;display:none}
</style>
</head>
<body>

<header class="topbar">
  <div class="logo"><div class="logo-icon">◆</div><div>Inventory Store<small>Management System</small></div></div>
  <nav class="nav">
    <a href="index.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="purchase.html">Purchase Entry</a>
    <a class="active" href="issue.html">Issue Entry</a>
    <a href="#">Stock Ledger</a>
    <a href="#">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#">Settings</a>
  </nav>
  <div class="user"><img src="public/waqas.jpg.png"><div><b>Muhammad Waqas</b><small>Store Officer</small></div></div>
</header>

<main class="page">
  <h1>📋 Issue Entry</h1>

  <div class="actions">
    <button class="add" onclick="addRow()">+ Add New Row</button>
    <button class="save" onclick="saveIssues()">💾 Save Issue</button>
    <button class="clear" onclick="clearRows()">🗑 Clear Page</button>
    <button class="excel">Export to Excel</button>
    <button class="pdf">Export PDF</button>
    <button class="print">Print Sheet</button>
    <button class="draft">Save Draft</button>
    <a class="back" href="index.html">← Back to Dashboard</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="rowno">#</th>
          <th class="date">Date</th>
          <th class="issue">Issue #</th>
          <th class="item">Item Name</th>
          <th class="size">Size</th>
          <th class="qty">Quantity</th>
          <th class="unit">Unit</th>
          <th class="stock">Available Stock</th>
          <th class="dept">Department</th>
          <th class="issued">Issued To</th>
          <th class="usefor">Use For</th>
          <th class="remarks">Remarks</th>
        </tr>
      </thead>
      <tbody id="issueBody"></tbody>
    </table>
  </div>
</main>

<div class="status" id="statusBox">Saved Successfully</div>

<script>
const SUPABASE_URL = "https://lzsxtvkluqvcaetnnydu.supabase.co";
const SUPABASE_KEY = "sb_publishable_QfemUy-seBo7fy6-uL_jBA_ZZGXkgma";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let itemsList = [];
let currentSuggestBox = null;
let currentSuggestItems = [];
let activeSuggestIndex = -1;

async function loadItems(){
  const { data, error } = await db.from("items").select("*").order("item_name");
  if(error){ alert("Items load error: " + error.message); return; }
  itemsList = data || [];
}

function formatDate(input){
  if(!input.value.trim()) return;
  const parts = input.value.split("-");
  if(parts.length === 2){
    const day = parts[0].padStart(2,"0");
    const month = Number(parts[1]);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const year = String(new Date().getFullYear()).slice(-2);
    if(month >= 1 && month <= 12) input.value = `${day}-${months[month-1]}-${year}`;
  }
}

function addRow(){
  const body = document.getElementById("issueBody");
  const tr = document.createElement("tr");
  const rowNo = body.children.length + 1;

  tr.innerHTML = `
    <td class="rowno">${rowNo}</td>
    <td><input class="date_in" onblur="formatDate(this)"></td>
    <td><input class="issue_no"></td>
    <td><input type="hidden" class="item_code"><input class="item_name" oninput="showItemSuggestions(this)" onkeydown="itemKeyMove(event,this)"></td>
    <td><input class="size_in" readonly></td>
    <td><input type="number" class="quantity" min="0"></td>
    <td><input class="unit_in" readonly></td>
    <td><input class="available_stock" readonly></td>
    <td><input class="department"></td>
    <td><input class="issued_to"></td>
    <td><input class="use_for"></td>
    <td><input class="remarks"></td>
  `;
  body.appendChild(tr);
}

function clearRows(){
  document.getElementById("issueBody").innerHTML = "";
  for(let i=0;i<20;i++) addRow();
}

function closeItemSuggestions(){
  if(currentSuggestBox) currentSuggestBox.remove();
  currentSuggestBox = null;
  currentSuggestItems = [];
  activeSuggestIndex = -1;
}

function showItemSuggestions(input){
  closeItemSuggestions();
  const value = input.value.trim().toLowerCase();
  if(!value) return;

  currentSuggestItems = itemsList.filter(item =>
    String(item.item_name || "").toLowerCase().includes(value) ||
    String(item.size || "").toLowerCase().includes(value) ||
    String(item.item_code || "").toLowerCase().includes(value)
  ).slice(0,20);

  if(!currentSuggestItems.length) return;

  const rect = input.getBoundingClientRect();
  const box = document.createElement("div");
  box.className = "item-suggest-box";
  box.style.left = rect.left + window.scrollX + "px";
  box.style.top = rect.bottom + window.scrollY + "px";
  box.style.width = Math.max(rect.width,380) + "px";

  currentSuggestItems.forEach((item,index)=>{
    const row = document.createElement("div");
    row.className = "item-suggest-row";
    row.innerHTML = `<b>${item.item_name || ""}</b><span>${item.size || ""}</span><span>${item.unit || ""}</span>`;
    row.onmousedown = e => {
      e.preventDefault();
      selectSuggestedItem(input,item);
    };
    box.appendChild(row);
  });

  document.body.appendChild(box);
  currentSuggestBox = box;
}

function itemKeyMove(event,input){
  if(!currentSuggestBox || !currentSuggestItems.length) return;
  const rows = [...currentSuggestBox.querySelectorAll(".item-suggest-row")];

  if(event.key === "ArrowDown"){
    event.preventDefault();
    activeSuggestIndex++;
    if(activeSuggestIndex >= rows.length) activeSuggestIndex = 0;
  }else if(event.key === "ArrowUp"){
    event.preventDefault();
    activeSuggestIndex--;
    if(activeSuggestIndex < 0) activeSuggestIndex = rows.length - 1;
  }else if(event.key === "Enter" || event.key === "Tab"){
    event.preventDefault();
    if(activeSuggestIndex < 0) activeSuggestIndex = 0;
    selectSuggestedItem(input,currentSuggestItems[activeSuggestIndex]);
    return;
  }else if(event.key === "Escape"){
    closeItemSuggestions();
    return;
  }else{
    return;
  }

  rows.forEach(r=>r.classList.remove("active"));
  if(rows[activeSuggestIndex]) rows[activeSuggestIndex].classList.add("active");
}

async function selectSuggestedItem(input,item){
  const row = input.closest("tr");

  row.querySelector(".item_code").value = item.item_code || "";
  row.querySelector(".item_name").value = item.item_name || "";
  row.querySelector(".size_in").value = item.size || "";
  row.querySelector(".unit_in").value = item.unit || "";

  const { data: stock } = await db
    .from("stock_transactions")
    .select("quantity_in,quantity_out")
    .eq("item_code", item.item_code);

  let balance = 0;
  (stock || []).forEach(r=>{
    balance += Number(r.quantity_in || 0);
    balance -= Number(r.quantity_out || 0);
  });

  row.querySelector(".available_stock").value = balance;
  closeItemSuggestions();
  row.querySelector(".quantity").focus();
}

async function saveIssues(){
  const rows = [...document.querySelectorAll("#issueBody tr")];
  const data = [];

  for(const row of rows){
    const itemName = row.querySelector(".item_name").value.trim();
    if(!itemName) continue;

    const qty = Number(row.querySelector(".quantity").value || 0);
    const available = Number(row.querySelector(".available_stock").value || 0);

    if(qty <= 0){ alert("Please enter quantity"); return; }
    if(qty > available){ alert(itemName + " quantity is more than available stock"); return; }

    data.push({
      transaction_date: row.querySelector(".date_in").value || null,
      bill_no: row.querySelector(".issue_no").value,
      item_code: row.querySelector(".item_code").value,
      item_name: itemName,
      size: row.querySelector(".size_in").value,
      category: "Inventory",
      store_type: "Inventory",
      transaction_type: "Issue",
      quantity_in: 0,
      quantity_out: qty,
      unit: row.querySelector(".unit_in").value,
      unit_rate: 0,
      freight: 0,
      supplier: row.querySelector(".issued_to").value,
      purchased_by: row.querySelector(".department").value,
      vehicle_no: row.querySelector(".use_for").value,
      remarks: row.querySelector(".remarks").value
    });
  }

  if(!data.length){ alert("Please enter at least one issue row"); return; }

  const { error } = await db.from("stock_transactions").insert(data);
  if(error){ alert("Save error: " + error.message); return; }

  showStatus();
  clearRows();
}

function showStatus(){
  const box = document.getElementById("statusBox");
  box.style.display = "block";
  setTimeout(()=>box.style.display="none",2000);
}

document.addEventListener("click",e=>{
  if(currentSuggestBox && !currentSuggestBox.contains(e.target) && !e.target.classList.contains("item_name")){
    closeItemSuggestions();
  }
});

document.addEventListener("DOMContentLoaded",async()=>{
  await loadItems();
  clearRows();
});
</script>

</body>
</html>
