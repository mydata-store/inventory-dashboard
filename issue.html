<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Issue Entry</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f5f6fa;color:#0f172a}
.topbar{height:76px;background:linear-gradient(90deg,#ffd782,#fff3d2);display:flex;align-items:center;justify-content:space-between;padding:0 28px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.logo{display:flex;align-items:center;gap:12px;font-weight:700}
.logo-icon{width:42px;height:42px;border-radius:12px;background:#f59e0b;display:flex;align-items:center;justify-content:center;color:white;font-size:22px}
.logo small{display:block;color:#92400e;font-size:12px}
.nav{display:flex;gap:14px;align-items:center}
.nav a{padding:12px 14px;border-radius:9px;text-decoration:none;color:#111827;font-weight:700;font-size:14px}
.nav a.active{background:#f59e0b;color:#fff}
.user{display:flex;align-items:center;gap:10px}
.user img{width:46px;height:46px;border-radius:50%;border:2px solid #fff}
.user b{font-size:14px}
.user small{display:block;color:#475569}

.page{padding:28px}
.title{display:flex;align-items:center;gap:12px;font-size:30px;font-weight:800;margin-bottom:22px}
.actions{background:#fff;border-radius:12px;padding:18px;box-shadow:0 8px 25px rgba(15,23,42,.08);display:flex;gap:14px;align-items:center;margin-bottom:24px}
button,.back-btn{border:none;border-radius:8px;padding:12px 18px;font-weight:700;cursor:pointer;text-decoration:none;font-size:14px}
.add{background:#2563eb;color:white}
.save{background:#059669;color:white}
.clear{background:#ef4444;color:white}
.excel{background:#ede9fe;color:#5b21b6}
.pdf{background:#d1fae5;color:#047857}
.print{background:#dbeafe;color:#1d4ed8}
.draft{background:#e5e7eb;color:#111827}
.back-btn{margin-left:auto;background:#ffedd5;color:#ea580c}

.table-wrap{background:#fff;border-radius:12px;box-shadow:0 8px 25px rgba(15,23,42,.08);overflow:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{background:#f6a11a;color:#111827;padding:10px;border:1px solid #d1d5db;font-size:13px;position:sticky;top:0;z-index:5}
td{border:1px solid #d1d5db;height:32px;padding:0}
td input,td select{width:100%;height:31px;border:none;outline:none;padding:4px 7px;font-size:13px;background:transparent}
td input:focus,td select:focus{outline:2px solid #2563eb;background:#fff7ed}

.row-no{width:45px;text-align:center;background:#f8fafc}
.date{width:110px}
.issue{width:105px}
.item{width:240px}
.size{width:100px}
.qty{width:110px}
.unit{width:105px}
.stock{width:145px;background:#f8fafc}
.dept{width:130px}
.issued{width:135px}
.usefor{width:135px}
.remarks{width:135px}

.status{position:fixed;top:90px;right:25px;background:#16a34a;color:#fff;padding:12px 18px;border-radius:8px;font-weight:700;display:none}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">◆</div>
    <div>Inventory Store<small>Management System</small></div>
  </div>

  <nav class="nav">
    <a href="index.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="purchase.html">Purchase Entry</a>
    <a class="active" href="issue.html">Issue Entry</a>
    <a href="#">Stock Ledger</a>
    <a href="#">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#">Settings</a>
  </nav>

  <div class="user">
    <img src="public/waqas.jpg.png" />
    <div><b>Muhammad Waqas</b><small>Store Officer</small></div>
  </div>
</header>

<main class="page">
  <div class="title">📋 Issue Entry</div>

  <div class="actions">
    <button class="add" onclick="addRow()">+ Add New Row</button>
    <button class="save" onclick="saveIssues()">💾 Save Issue</button>
    <button class="clear" onclick="clearRows()">🗑 Clear Page</button>
    <button class="excel">Export to Excel</button>
    <button class="pdf">Export PDF</button>
    <button class="print">Print Sheet</button>
    <button class="draft">Save Draft</button>
    <a class="back-btn" href="index.html">← Back to Dashboard</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="row-no">#</th>
          <th class="date">Date</th>
          <th class="issue">Issue #</th>
          <th class="item">Item Name</th>
          <th class="size">Size</th>
          <th class="qty">Quantity</th>
          <th class="unit">Unit</th>
          <th class="stock">Available Stock</th>
          <th class="dept">Department</th>
          <th class="issued">Issued To</th>
          <th class="usefor">Use For</th>
          <th class="remarks">Remarks</th>
        </tr>
      </thead>
      <tbody id="issueBody"></tbody>
    </table>
    <datalist id="itemsList"></datalist>
  </div>
</main>

<div class="status" id="statusBox">Saved Successfully</div>

<script>
const SUPABASE_URL = "https://lzsxtvkluquvcaetnnydu.supabase.co";
const SUPABASE_KEY = "sb_publishable_QfemUy-seBo7fy6-uL_jBA_ZZGXkgma";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let itemsList = [];

async function loadItems() {
  const { data } = await db.from("items").select("*").order("item_name");
  itemsList = data || [];

  const list = document.getElementById("itemsList");
  if (list) {
    list.innerHTML = itemsList.map(item => `
      <option value="${item.item_name}">
        ${item.size || ""} - ${item.unit || ""}
      </option>
    `).join("");
  }
}
function addRow() {
  const body = document.getElementById("issueBody");
  const tr = document.createElement("tr");
  const rowNo = body.children.length + 1;

  tr.innerHTML = `
    <td class="row-no">${rowNo}</td>
    <td><input type="text" class="date_in" onblur="formatDate(this)"></td>
    <td><input class="issue_no"></td>
    <td>
      <input type="hidden" class="item_code">
      <td><input class="item_name"list="itemsList" oninput="fillItem(this)"></td>
    <td><input class="size_in" readonly></td>
    <td><input type="number" class="quantity" min="0"></td>
    <td><input class="unit_in" readonly></td>
    <td><input class="available_stock" readonly></td>
    <td><input class="department"></td>
    <td><input class="issued_to"></td>
    <td><input class="use_for"></td>
    <td><input class="remarks"></td>
  `;
  body.appendChild(tr);
}

async function findItem(input) {
  const row = input.closest("tr");
  const value = input.value.trim().toLowerCase();
  if (!value) return;

  const matches = itemsList.filter(x =>
    String(x.item_name || "").toLowerCase().includes(value)
  );

  if (!matches.length) {
    alert("Item not found");
    return;
  }

  let item = matches[0];

  if (matches.length > 1) {
    const list = matches.map((x,i)=>`${i+1}. ${x.item_name} ${x.size || ""} ${x.unit || ""}`).join("\n");
    const choice = prompt("Select item number:\n" + list, "1");
    const index = Number(choice) - 1;
    if (!matches[index]) return;
    item = matches[index];
  }

  row.querySelector(".item_code").value = item.item_code || "";
  row.querySelector(".item_name").value = item.item_name || "";
  row.querySelector(".size_in").value = item.size || "";
  row.querySelector(".unit_in").value = item.unit || "";

  const { data: stock } = await db
    .from("stock_transactions")
    .select("quantity_in, quantity_out")
    .eq("item_code", item.item_code);

  let balance = 0;
  (stock || []).forEach(r => {
    balance += Number(r.quantity_in || 0);
    balance -= Number(r.quantity_out || 0);
  });

  row.querySelector(".available_stock").value = balance;
}

async function saveIssues() {
  const rows = [...document.querySelectorAll("#issueBody tr")];
  const data = [];

  for (const row of rows) {
    const itemName = row.querySelector(".item_name").value.trim();
    if (!itemName) continue;

    const qty = Number(row.querySelector(".quantity").value || 0);
    const available = Number(row.querySelector(".available_stock").value || 0);

    if (qty <= 0) {
      alert("Please enter quantity");
      return;
    }

    if (qty > available) {
      alert(itemName + " quantity is more than available stock");
      return;
    }

    data.push({
      transaction_date: row.querySelector(".date_in").value || null,
      bill_no: row.querySelector(".issue_no").value,
      item_code: row.querySelector(".item_code").value,
      item_name: itemName,
      size: row.querySelector(".size_in").value,
      category: "Inventory",
      store_type: "Inventory",
      transaction_type: "Issue",
      quantity_in: 0,
      quantity_out: qty,
      unit: row.querySelector(".unit_in").value,
      unit_rate: 0,
      freight: 0,
      supplier: row.querySelector(".issued_to").value,
      purchased_by: row.querySelector(".department").value,
      vehicle_no: row.querySelector(".use_for").value,
      remarks: row.querySelector(".remarks").value
    });
  }

  if (!data.length) {
    alert("Please enter at least one issue row");
    return;
  }

  const { error } = await db.from("stock_transactions").insert(data);

  if (error) {
    alert("Save error: " + error.message);
    return;
  }

  showStatus();
  clearRows();
}

function clearRows() {
  document.getElementById("issueBody").innerHTML = "";
  for (let i = 0; i < 20; i++) addRow();
}

function showStatus() {
  const box = document.getElementById("statusBox");
  box.style.display = "block";
  setTimeout(() => box.style.display = "none", 2000);
}

function formatDate(input) {
    if (!input.value.trim()) return;

    const parts = input.value.split("-");
    if (parts.length === 2) {
        const day = parts[0].padStart(2, "0");
        const month = Number(parts[1]);

        const months = [
            "Jan","Feb","Mar","Apr","May","Jun",
            "Jul","Aug","Sep","Oct","Nov","Dec"
        ];

        const year = String(new Date().getFullYear()).slice(-2);

        if (month >= 1 && month <= 12) {
            input.value = `${day}-${months[month-1]}-${year}`;
        }
    }
}

function fillItem(input){

    const row = input.closest("tr");

    const item = itemsList.find(i =>
        i.item_name &&
        i.item_name.toLowerCase() === input.value.toLowerCase()
    );

if(!item) return;

row.querySelector(".item_code").value = item.item_code || "";
  
    row.querySelector(".size_in").value = item.item_size || "";
    row.querySelector(".unit_in").value = item.unit || "";

    const available =
        (item.opening_stock || 0) +
        (item.purchase_qty || 0) -
        (item.issue_qty || 0);

    row.querySelector(".available_stock").value = available;
}
  
document.addEventListener("DOMContentLoaded", async () => {
    await loadItems();
    clearRows();
});
  
</script>

</body>
</html>
