<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Items Master</title>

  <link rel="stylesheet" href="public/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">◆</div>
      <h2>Inventory Store</h2>
      <p>Management System</p>
    </div>

    <nav>
      <a href="index.html">Dashboard</a>
      <a class="active" href="items.html">Items</a>
      <a>Purchase Entry</a>
      <a>Issue Entry</a>
      <a>Stock Ledger</a>
      <a>Reports</a>
      <a>Suppliers</a>
      <a>Users</a>
      <a>Settings</a>
    </nav>
  </aside>

  <main class="main">
    <h1>Items Master</h1>

    <div class="form-box">
      <h3>Add New Item</h3>

      <div class="form-grid">
        <input id="item_code" placeholder="Item Code" readonly>
        <input id="item_name" placeholder="Item Name">
        <input id="size" placeholder="Size">

        <select id="unit">
          <option value="">Unit</option>
          <option>Kg</option>
          <option>Gram</option>
          <option>Ltr</option>
          <option>Nos</option>
          <option>Piece</option>
          <option>Box</option>
          <option>Feet</option>
          <option>Meter</option>
          <option>Roll</option>
          <option>Bag</option>
        </select>

        <select id="category">
          <option value="">Select Category</option>
          <option>Lubricants</option>
          <option>Chemicals</option>
          <option>Raw Materials</option>
          <option>Bearings</option>
          <option>V Belts</option>
          <option>Electrical</option>
          <option>Mechanical</option>
          <option>Tools</option>
          <option>Safety</option>
          <option>Others</option>
        </select>

        <input id="opening_stock" type="number" placeholder="Opening Stock">
        <input id="minimum_stock" type="number" placeholder="Minimum Stock">
        <input id="location" placeholder="Location">
      </div>

      <button id="saveBtn" class="btn-save" onclick="saveItem()">Save Item</button>
    </div>

    <div class="items-table">
      <table>
        <thead>
          <tr>
            <th>Item Code</th>
            <th>Item Name</th>
            <th>Size</th>
            <th>Unit</th>
            <th>Category</th>
            <th>Opening Stock</th>
            <th>Minimum Stock</th>
            <th>Location</th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>
  </main>

<script>
const SUPABASE_URL = "https://lzsxtvkluqvcaetnnydu.supabase.co";
const SUPABASE_KEY = "sb_publishable_QfemUy-S0bO7fy6-uL_jBA_ZzGXKgma";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadItems() {
  const { data, error } = await db
    .from("items")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    alert("Load error: " + error.message);
    return;
  }

  const body = document.getElementById("itemsBody");
  body.innerHTML = "";

  data.forEach(item => {
    body.innerHTML += `
      <tr>
        <td>${item.item_code}</td>
        <td>${item.item_name}</td>
        <td>${item.size}</td>
        <td>${item.unit}</td>
        <td>${item.category || ""}</td>
        <td>${item.opening_stock}</td>
        <td>${item.minimum_stock}</td>
        <td>${item.location || ""}</td>
      </tr>`;
  });

  const nextNumber = data.length + 1;
  document.getElementById("item_code").value =
    "ITM-" + String(nextNumber).padStart(4, "0");
}

async function saveItem() {
  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  saveBtn.textContent = "Saving...";

  const itemName = document.getElementById("item_name").value.trim();
  const itemSize = document.getElementById("size").value.trim();
  const unit = document.getElementById("unit").value;
  const category = document.getElementById("category").value;

  if (!itemName || !unit) {
    alert("Please enter Item Name and Unit");
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Item";
    return;
  }

  const { data: existingItem, error: checkError } = await db
    .from("items")
    .select("*")
    .ilike("item_name", itemName)
    .eq("size", itemSize)
    .maybeSingle();

  if (checkError) {
    alert("Check error: " + checkError.message);
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Item";
    return;
  }

  if (existingItem) {
    alert("This item with same size already exists. Use code: " + existingItem.item_code);
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Item";
    return;
  }

  const item = {
    item_code: document.getElementById("item_code").value,
    item_name: itemName,
    size: itemSize,
    unit: unit,
    category: category,
    opening_stock: Number(document.getElementById("opening_stock").value || 0),
    minimum_stock: Number(document.getElementById("minimum_stock").value || 0),
    location: document.getElementById("location").value
  };

  const { error } = await db.from("items").insert([item]);

  if (error) {
    alert("Save error: " + error.message);
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Item";
    return;
  }

  alert("Item saved successfully");

  document.getElementById("item_name").value = "";
  document.getElementById("size").value = "";
  document.getElementById("unit").value = "";
  document.getElementById("category").value = "";
  document.getElementById("opening_stock").value = "";
  document.getElementById("minimum_stock").value = "";
  document.getElementById("location").value = "";

  saveBtn.disabled = false;
  saveBtn.textContent = "Save Item";

  loadItems();
}

loadItems();
</script>

</body>
</html>
