<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items Master</title>

<link rel="stylesheet" href="public/style.css">

<style>
.form-box{
    background:#fff;
    padding:25px;
    border-radius:16px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.form-grid input,
.form-grid select{
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

.btn-save{
    background:#f6a11a;
    color:#fff;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
}

.items-table{
    width:100%;
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.items-table table{
    width:100%;
    border-collapse:collapse;
}

.items-table th{
    background:#f6a11a;
    color:#fff;
    padding:14px;
}

.items-table td{
    padding:12px;
    border-bottom:1px solid #eee;
}
</style>

</head>
<body>

<aside class="sidebar">

<div class="brand">
<div class="logo">◆</div>
<h2>Inventory Store</h2>
<p>Management System</p>
</div>

<nav>
<a href="index.html">Dashboard</a>
<a class="active">Items</a>
<a>Purchase Entry</a>
<a>Issue Entry</a>
<a>Stock Ledger</a>
<a>Reports</a>
<a>Suppliers</a>
<a>Users</a>
<a>Settings</a>
</nav>

</aside>

<main class="main">

<h1>Items Master</h1>

<div class="form-box">

<h3>Add New Item</h3>

<div class="form-grid">

<input type="text" placeholder="Item Name">

<input type="text" placeholder="Size">

<select>
<option>Unit</option>
<option>Kg</option>
<option>Nos</option>
<option>Pcs</option>
<option>Bags</option>
<option>Ltr</option>
</select>

<input type="number" placeholder="Opening Stock">

<input type="number" placeholder="Minimum Stock">

<input type="text" placeholder="Location">

</div>

<button class="btn-save">Save Item</button>

</div>

<div class="items-table">

<table>

<tr>
<th>Item Name</th>
<th>Size</th>
<th>Unit</th>
<th>Opening Stock</th>
<th>Minimum Stock</th>
</tr>

<tr>
<td>MS Nut Bolt</td>
<td>1/2 x 3 Inch</td>
<td>Kg</td>
<td>500</td>
<td>50</td>
</tr>

<tr>
<td>MS Welding Rod</td>
<td>Standard</td>
<td>Kg</td>
<td>300</td>
<td>30</td>
</tr>

</table>

</div>

</main>

</body>
</html>
